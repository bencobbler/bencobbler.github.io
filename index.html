<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Diszkódiktátor</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        #homeImage {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            display: block;
            cursor: pointer;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(80, 80, 80, 0.88);
            display: none;
            justify-content: center;
            align-items: center;
        }

        #menu {
            text-align: center;
            font-size: 2rem;
        }

        #menu div {
            margin: 20px 0;
            cursor: pointer;
        }

        .page {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #111;
            padding: 20px;
            box-sizing: border-box;
        }

        .backButton {
            margin-bottom: 20px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .tabs {
            margin-bottom: 10px;
        }

        .tabs button {
            margin-right: 10px;
            padding: 8px 16px;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: 85%;
            border: none;
            background: white;
        }
        .tabbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .tab {
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(0,0,0,0.4);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(6px);
        }

        .tab.active {
            background: white;
            color: black;
        }

        .imageWrap {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }

        #programImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .fullscreenImage {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <img id="homeImage" src="diszkofej.jpg" alt="diszkofej" onclick="toggleMenu()">

    <div id="overlay" onclick="toggleMenu()">
        <div id="menu" onclick="event.stopPropagation()">
            <div onclick="openPage('diszko')">Diszkódiktátor</div>
            <div onclick="openPage('program')">Programtábla</div>
            <div onclick="openPage('videok')">Videók</div>
            <div onclick="openPage('rolunk')">Rólunk</div>
        </div>
    </div>

    <div id="diszko" class="page">
        <div class="backButton" onclick="goHome()">← Vissza</div>
        <h1>Diszkódiktátor</h1>
        <p>Itt lesz majd a tartalom.</p>
    </div>

    <div id="program" class="page">

        <div class="backButton" onclick="goHome()">← Vissza</div>

        <div class="tabbar">
            <div class="tab active" onclick="switchDay('Sze.jpg', this)">Sze</div>
            <div class="tab" onclick="switchDay('Cs.jpg', this)">Cs</div>
            <div class="tab" onclick="switchDay('P.jpg', this)">P</div>
            <div class="tab" onclick="switchDay('Szo.jpg', this)">Szo</div>
        </div>

        <img id="programImage" class="fullscreenImage" src="Sze.jpg" alt="Programtábla">

    </div>

    <div id="videok" class="page">
        <div class="backButton" onclick="goHome()">← Vissza</div>
        <h1>Videók</h1>
        <p>Itt lesznek majd videók.</p>
    </div>

    <div id="rolunk" class="page">
        <div class="backButton" onclick="goHome()">← Vissza</div>
        <h1>Rólunk</h1>
        <p>Itt lesz majd bemutatkozás.</p>
    </div>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById("overlay");
            overlay.style.display = (overlay.style.display === "flex") ? "none" : "flex";
        }

        function openPage(pageId) {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("homeImage").style.display = "none";

            const pages = document.querySelectorAll(".page");
            pages.forEach(page => page.style.display = "none");

            document.getElementById(pageId).style.display = "block";
        }

        function goHome() {
            const pages = document.querySelectorAll(".page");
            pages.forEach(page => page.style.display = "none");

            document.getElementById("homeImage").style.display = "block";
        }

        function loadImage(fileName) {
            document.getElementById("programImage").src = fileName;
        }

        function switchDay(file, el) {
            document.getElementById("programImage").src = file;

            // aktív tab kezelés
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            el.classList.add("active");
        }
    </script>

</body>
</html>
